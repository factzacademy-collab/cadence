name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run db:push
        env:
          DATABASE_URL: file:./db/ci.db
      - run: bun run db:seed
        env:
          DATABASE_URL: file:./db/ci.db
          NEXTAUTH_SECRET: ci-secret
          NEXTAUTH_URL: http://localhost:3000
      - run: bun run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run db:generate
        env:
          DATABASE_URL: file:./db/ci.db
      - run: bun run build
        env:
          DATABASE_URL: file:./db/ci.db
          NEXTAUTH_SECRET: ci-secret
          NEXTAUTH_URL: http://localhost:3000
